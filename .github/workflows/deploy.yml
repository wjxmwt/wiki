name: Deploy iGEM Wiki to GitHub Pages

on:
  push:
    branches:
      - main  # 当你向 main 分支提交代码时触发

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies 📦
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Freeze site 🧊
        run: flask freeze
        env:
          FLASK_APP: app.py

      - name: Deploy to GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public  # 告诉 GitHub 发布的文件夹是生成的 public 目录
